<!DOCTYPE html>
<html lang="he" dir="rtl">
    <head>
        <meta charset="UTF–8">
        <title>Skibidi Isaacs Snake Game</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="game–container">
            <h2>Points: <span id="score">0</span></h2>
            <div id="grid"></div>
            <div class="controls">
                <button class="arrow" onclick="changeDir(-20)">↑</button><br>
                <button class="arrow" onclick="changeDir(-1)">→</button>
                <button class="arrow" onclick="changeDir(20)">↓</button>
                <button class="arrow" onclick="changeDir(1)">←</button>
            </div>
            <button id="start-btn" onclick="startGame()">Start Skibidi Game</button>
        </div>
        <script src="script.js"></script>
        <button class="arrow" onclick="startGame()">Play Skibidi Game</button>
        <button class="arrow" onclick="endGame()">End Skibidi Game</button>
    </body>
</html>
